server.port=8080

# File-based H2 database (data survives restarts)
# AUTO_SERVER=TRUE allows the app and H2 console to share the same file DB
spring.datasource.url=jdbc:h2:file:./data/garage;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA creates/updates the vehicle table from the @Entity class
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

# H2 web console: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/garage;AUTO_SERVER=TRUE  |  User: sa  |  Password: (empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
